<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Calculator</title>
	<script src="js/calcfunction.js" defer></script>
	<link rel="stylesheet" href="css/calc-base-look.css">
</head>

<body>
	<div class="calculator">
		<div class="display">000</div>
		<div class="calc-buttons">
			<div class="additionBtnRw">
				<button id="clear" class="btn">C</button>
				<button id="delete" class="btn">D</button>
				<button class="special-operator btn">+/-</button>
				<button class="operator btn">+</button>
			</div>
			<div class="subtractionBtnRw">
				<button class="number btn">7</button>
				<button class="number btn">8</button>
				<button class="number btn">9</button>
				<button class="operator btn">-</button>
			</div>
			<div class="multiplicationBtnRw">
				<button class="number btn">4</button>
				<button class="number btn">5</button>
				<button class="number btn">6</button>
				<button class="operator btn">X</button>
			</div>
			<div class="divisionBtnRw">
				<button class="number btn">1</button>
				<button class="number btn">2</button>
				<button class="number btn">3</button>
				<button class="operator btn">/</button>
			</div>
			<div class="equalsBtnRw">
				<button class="number btn zero">0</button>
				<button class="special-operator btn">.</button>
				<button id="equals-btn" class="btn">=</button>
			</div>
		</div>
	</div>
</body>

</html>
