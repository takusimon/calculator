<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Calculator</title>
	<script src="js/calcfunction.js" defer></script>
	<link rel="stylesheet" href="css/calc-base-look.css">
</head>

<body>
	<div class="calculator">
		<div class="display">000</div>
		<div class="calc-buttons">
			<div class="additionBtnRw">
				<button id="clear" class="btn">C</button>
				<button id="delete" class="btn">D</button>
				<button class="special-operator btn">+/-</button>
				<button class="number btn">+</button>
			</div>
			<div class="subtractionBtnRw"></div>
			<div class="multiplicationBtnRw"></div>
			<div class="divisionBtnRw"></div>
			<div class="equalsBtnRw"></div>
		</div>
	</div>
</body>

</html>
